<header class="header-container">
  <a href="#">
    <img src="./images/matt.svg" class="nav-logo" alt="Matt — home" />
  </a>
  <div class="nav-links">
    <p>{{ 'HEADER.MENTORSHIP' | translate }}</p>
    <p-toggleswitch
      [ngModel]="isDark()"
      (ngModelChange)="themeToggle.emit()"
      ariaLabel="Toggle dark mode"
      [title]="(isDark() ? 'HEADER.SWITCH_TO_LIGHT' : 'HEADER.SWITCH_TO_DARK') | translate"
    ></p-toggleswitch>
    <p-select
      [options]="languages"
      [ngModel]="currentLang()"
      (ngModelChange)="onLangChange($event)"
      optionLabel="label"
      optionValue="value"
      styleClass="lang-select"
    ></p-select>
    <p-button [label]="'HEADER.SAY_HELLO' | translate" rounded outlined />
  </div>
</header>
